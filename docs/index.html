<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTI Study Notes</title>
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --border: #2a2a40;
      --gold: #c9a227; --text: #e8e8e8; --muted: #777;
      --green: #2ecc71; --red: #e74c3c; --purple: #6c63ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
    .logo span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 6px; }
    .stats { font-size: 13px; color: var(--muted); }
    .stats strong { color: var(--gold); }
    .search-bar { padding: 24px 32px 0; max-width: 900px; margin: 0 auto; }
    .search-bar input { width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-bar input:focus { border-color: var(--gold); }
    .search-bar input::placeholder { color: var(--muted); }
    main { max-width: 900px; margin: 0 auto; padding: 24px 32px 48px; display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start; }
    .sessions-panel { position: sticky; top: 84px; max-height: calc(100vh - 100px); overflow-y: auto; }
    .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
    .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .session-card:hover { border-color: var(--gold); }
    .session-card.active { border-color: var(--gold); background: #1f1f35; }
    .session-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .session-card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
    .session-card-meta .words { color: var(--gold); }
    .session-card.has-notes .session-card-title::after { content: ' ✏️'; font-size: 10px; }
    .session-card.is-notepad { border-left: 3px solid var(--purple); }
    .new-notepad-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed #3a3a55; border-radius: 10px; color: var(--muted); font-size: 13px; cursor: pointer; margin-bottom: 16px; transition: all 0.15s; }
    .new-notepad-btn:hover { border-color: var(--purple); color: #9d97ff; }
    .detail-panel { min-height: 400px; }
    .empty-state { color: var(--muted); text-align: center; padding: 80px 20px; font-size: 15px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 24px; display: flex; gap: 16px; }
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
    .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .tab:not(.active):hover { border-color: var(--gold); color: var(--text); }
    .content-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; max-height: 560px; overflow-y: auto; }
    .content-box.summary { white-space: normal; }
    .notes-area { width: 100%; min-height: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; font-size: 14px; line-height: 1.7; color: var(--text); font-family: inherit; resize: vertical; outline: none; transition: border-color 0.2s; }
    .notes-area:focus { border-color: var(--gold); }
    .notes-area::placeholder { color: #444; }
    .notes-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; margin-bottom: 20px; }
    .save-status { font-size: 12px; color: var(--muted); min-height: 18px; transition: color 0.3s; }
    .save-status.saved { color: var(--green); }
    .save-status.saving { color: var(--gold); }

    /* Image section */
    .images-section { margin-top: 4px; }
    .images-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .images-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .upload-btn { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .upload-btn:hover { border-color: var(--gold); color: var(--gold); }
    .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; font-size: 13px; color: var(--muted); transition: all 0.2s; cursor: pointer; margin-bottom: 12px; }
    .drop-zone.drag-over { border-color: var(--gold); background: rgba(201,162,39,0.05); color: var(--gold); }
    .drop-zone.has-images { display: none; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .image-thumb { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; background: var(--surface); }
    .image-thumb img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
    .image-thumb:hover img { opacity: 0.7; }
    .image-thumb .del-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; width: 22px; height: 22px; color: #fff; font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1; }
    .image-thumb:hover .del-btn { display: flex; }
    .add-more-thumb { border: 2px dashed var(--border); border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .add-more-thumb:hover { border-color: var(--gold); color: var(--gold); }
    .uploading-indicator { font-size: 12px; color: var(--gold); margin-top: 8px; min-height: 18px; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 20px; right: 24px; font-size: 32px; color: #fff; cursor: pointer; line-height: 1; }

    .copy-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    .loading { color: var(--muted); padding: 40px 0; text-align: center; font-size: 14px; }
    .loading::after { content: ''; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      .sessions-panel { position: static; max-height: none; }
      header { padding: 0 16px; }
      .search-bar { padding: 16px 16px 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ARTI <span>Study Notes</span></div>
  <div class="stats" id="headerStats">Loading...</div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search lessons...">
</div>

<main>
  <div class="sessions-panel">
    <button class="new-notepad-btn" onclick="createNotepad()">+ New Notepad</button>
    <div class="panel-title">All Sessions</div>
    <div id="sessionList"><div class="loading">Loading</div></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="icon">📚</div>
      Select a lesson to view notes
    </div>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">×</span>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">

<script>
const FIREBASE_PROJECT  = 'arti-2195b';
const FIREBASE_API_KEY  = 'AIzaSyCPLkBhz_xznp9BP46K89pTR-uw2W5NilA';
const FIRESTORE_BASE    = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents`;

let allSessions  = [];
let activeId     = null;
let notesDebounce = null;

function fv(f) { return f ? (f.stringValue ?? f.integerValue ?? '') : ''; }

// ── Firebase helpers ──────────────────────────────────────────────────────────

async function loadSessions() {
  const res  = await fetch(`${FIRESTORE_BASE}/sessions?key=${FIREBASE_API_KEY}&pageSize=200`);
  const data = await res.json();
  if (!data.documents) return [];
  return data.documents.map(doc => {
    const f = doc.fields || {};
    const id = doc.name.split('/').pop();
    return {
      id,
      title:     fv(f.title)     || 'Untitled',
      date:      fv(f.date)      || '',
      timestamp: parseInt(fv(f.timestamp) || '0'),
      wordCount: parseInt(fv(f.wordCount) || '0'),
      transcript: fv(f.transcript) || '',
      summary:   fv(f.summary)   || '',
      notes:     fv(f.notes)     || '',
      imageObjs: null, // loaded lazily when notes tab opens
      isNotepad: f.isNotepad?.booleanValue || false,
    };
  }).sort((a, b) => b.timestamp - a.timestamp);
}

async function patchField(sessionId, fieldName, value) {
  const body = { fields: { [fieldName]: typeof value === 'string'
    ? { stringValue: value }
    : { arrayValue: { values: value.map(v => ({ stringValue: v })) } }
  }};
  await fetch(`${FIRESTORE_BASE}/sessions/${sessionId}?updateMask.fieldPaths=${fieldName}&key=${FIREBASE_API_KEY}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

// Compress image to JPEG via canvas — keeps Firestore docs small
async function compressImage(file, maxPx = 1200, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Store image as base64 in Firestore subcollection: sessions/{id}/images/{imgId}
async function uploadImageToFirestore(sessionId, file) {
  const base64 = await compressImage(file);
  const url = `${FIRESTORE_BASE}/sessions/${sessionId}/images?key=${FIREBASE_API_KEY}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: {
      data:      { stringValue: base64 },
      name:      { stringValue: file.name || 'image' },
      timestamp: { integerValue: String(Date.now()) },
    }})
  });
  if (!res.ok) throw new Error(`Image save failed: ${res.status}`);
  const doc = await res.json();
  return { id: doc.name.split('/').pop(), data: base64 };
}

async function loadImagesForSession(sessionId) {
  const res  = await fetch(`${FIRESTORE_BASE}/sessions/${sessionId}/images?key=${FIREBASE_API_KEY}`);
  const data = await res.json();
  if (!data.documents) return [];
  return data.documents
    .map(doc => ({ id: doc.name.split('/').pop(), data: fv(doc.fields?.data), ts: parseInt(fv(doc.fields?.timestamp)||'0') }))
    .sort((a,b) => a.ts - b.ts);
}

async function deleteImageFromFirestore(sessionId, imageId) {
  await fetch(`${FIRESTORE_BASE}/sessions/${sessionId}/images/${imageId}?key=${FIREBASE_API_KEY}`, { method: 'DELETE' });
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderSummaryHtml(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3 style="color:#c9a227;margin:16px 0 6px;font-size:14px;">$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2 style="color:#c9a227;margin:20px 0 8px;font-size:16px;border-bottom:1px solid #2a2a40;padding-bottom:6px;">$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1 style="color:#c9a227;margin:20px 0 10px;font-size:18px;">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm,   '<li style="margin:4px 0 4px 16px;">$1</li>')
    .replace(/\n\n/g, '<br><br>');
}

function renderSessionList(sessions) {
  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<div style="color:#555;font-size:13px;padding:12px 0;">No sessions yet. Record your first lesson!</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-card ${s.id===activeId?'active':''} ${s.notes||s.images?.length?'has-notes':''} ${s.isNotepad?'is-notepad':''}"
         onclick="selectSession('${s.id}')">
      <div class="session-card-title">${s.isNotepad?'📓 ':''}${s.title}</div>
      <div class="session-card-meta">
        <span>${s.date}</span>
        ${s.isNotepad
          ? `<span style="color:#9d97ff">notepad</span>`
          : `<span class="words">${s.wordCount.toLocaleString()} words</span>`}
        ${s.imageObjs?.length ? `<span style="color:#9d97ff">${s.imageObjs.length} 🖼</span>` : ''}
      </div>
    </div>`).join('');
}

function renderImagesSection(session) {
  const imgs = session.imageObjs || [];
  return `
    <div class="images-section">
      <div class="images-header">
        <span class="images-label">Images & Screenshots</span>
        <button class="upload-btn" onclick="triggerFileInput()">+ Upload</button>
      </div>
      <div class="drop-zone ${imgs.length?'has-images':''}" id="dropZone"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
           onclick="triggerFileInput()">
        Drag & drop images here, paste (Ctrl+V), or click to upload
      </div>
      <div class="image-grid" id="imageGrid">
        ${imgs.map((img,i) => `
          <div class="image-thumb" onclick="openLightbox('${img.data}')">
            <img src="${img.data}" alt="screenshot ${i+1}" loading="lazy">
            <button class="del-btn" onclick="deleteImage(event,'${session.id}','${img.id}',${i})">×</button>
          </div>`).join('')}
        ${imgs.length ? `<div class="add-more-thumb" onclick="triggerFileInput()">+</div>` : ''}
      </div>
      <div class="uploading-indicator" id="uploadStatus"></div>
    </div>`;
}

function selectSession(id) {
  activeId = id;
  const session = allSessions.find(s => s.id === id);
  if (!session) return;
  renderSessionList(filterSessions(document.getElementById('searchInput').value));

  const panel = document.getElementById('detailPanel');
  panel.dataset.transcript = session.transcript;
  panel.dataset.summary    = session.summary;
  panel.dataset.sessionId  = session.id;
  panel.dataset.notes      = session.notes || '';

  panel.innerHTML = `
    <div class="detail-title">${session.title}</div>
    <div class="detail-meta">
      <span>${session.date}</span>
      <span>${session.wordCount.toLocaleString()} words</span>
    </div>
    <div class="tabs">
      ${session.isNotepad ? '' : '<button class="tab" onclick="showTab(\'summary\',this)">📋 Study Notes</button>'}
      <button class="tab ${session.isNotepad?'active':''}" onclick="showTab('notes',this)">✏️ My Notes</button>
      ${session.isNotepad ? '' : '<button class="tab" onclick="showTab(\'transcript\',this)">📝 Transcript</button>'}
    </div>
    <div id="tabContent">
      ${session.isNotepad ? '' : `<div class="content-box summary">${renderSummaryHtml(session.summary)}</div>`}
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyActive()" ${session.isNotepad?'style="display:none"':''}>Copy to clipboard</button>
  `;

  if (session.isNotepad) showTab('notes', panel.querySelector('.tab.active'));
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const panel   = document.getElementById('detailPanel');
  const content = document.getElementById('tabContent');
  const copyBtn = document.getElementById('copyBtn');
  const session = allSessions.find(s => s.id === activeId);

  if (tab === 'summary') {
    content.innerHTML = `<div class="content-box summary">${renderSummaryHtml(panel.dataset.summary)}</div>`;
    copyBtn.style.display = 'inline-block';
  } else if (tab === 'transcript') {
    content.innerHTML = `<div class="content-box">${panel.dataset.transcript}</div>`;
    copyBtn.style.display = 'inline-block';
  } else if (tab === 'notes') {
    copyBtn.style.display = 'none';
    content.innerHTML = `
      <textarea class="notes-area" id="notesTextarea"
        placeholder="Type your notes here — questions, key points, things to memorize...&#10;&#10;You can also paste or upload screenshots below."
      >${panel.dataset.notes}</textarea>
      <div class="notes-footer">
        <span class="save-status" id="saveStatus"></span>
      </div>
      ${renderImagesSection(session)}
    `;

    // Text auto-save
    document.getElementById('notesTextarea').addEventListener('input', e => {
      const status = document.getElementById('saveStatus');
      status.textContent = 'Saving...'; status.className = 'save-status saving';
      panel.dataset.notes = e.target.value;
      clearTimeout(notesDebounce);
      notesDebounce = setTimeout(async () => {
        await patchField(panel.dataset.sessionId, 'notes', e.target.value);
        if (session) session.notes = e.target.value;
        status.textContent = '✓ Saved'; status.className = 'save-status saved';
        setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 2000);
      }, 800);
    });

    // Load images lazily when notes tab opens
    const session = allSessions.find(s => s.id === activeId);
    if (session && !session.imageObjs) {
      loadImagesForSession(activeId).then(imgs => {
        session.imageObjs = imgs;
        refreshImageGrid(session);
      });
    }

    // Paste image support
    document.getElementById('notesTextarea').addEventListener('paste', e => {
      const items = [...(e.clipboardData?.items || [])];
      const imgItem = items.find(i => i.type.startsWith('image/'));
      if (imgItem) { e.preventDefault(); handleFiles([imgItem.getAsFile()]); }
    });

    // Also catch paste anywhere on the page while notes tab is active
    document.addEventListener('paste', globalPasteHandler);
  }
}

function globalPasteHandler(e) {
  if (!document.getElementById('notesTextarea')) {
    document.removeEventListener('paste', globalPasteHandler);
    return;
  }
  // Only handle if not already handled by textarea
  if (e.target === document.getElementById('notesTextarea')) return;
  const items = [...(e.clipboardData?.items || [])];
  const imgItem = items.find(i => i.type.startsWith('image/'));
  if (imgItem) handleFiles([imgItem.getAsFile()]);
}

// ── Image upload handlers ────────────────────────────────────────────────────

function triggerFileInput() {
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', e => {
  handleFiles([...e.target.files]);
  e.target.value = '';
});

function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone')?.classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('dropZone')?.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone')?.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
}

async function handleFiles(files) {
  if (!files.length || !activeId) return;
  const status = document.getElementById('uploadStatus');
  if (status) { status.textContent = `Compressing & saving ${files.length} image${files.length>1?'s':''}...`; }

  const session = allSessions.find(s => s.id === activeId);
  if (!session) return;
  if (!session.imageObjs) session.imageObjs = [];

  for (const file of files) {
    try {
      const imgObj = await uploadImageToFirestore(activeId, file);
      session.imageObjs.push(imgObj);
      refreshImageGrid(session);
    } catch (err) {
      if (status) status.textContent = 'Upload failed: ' + err.message;
      return;
    }
  }

  if (status) {
    status.textContent = `✓ ${files.length} image${files.length>1?'s':''} saved`;
    setTimeout(() => { if (status) status.textContent = ''; }, 2000);
  }
  renderSessionList(filterSessions(document.getElementById('searchInput').value));
}

function refreshImageGrid(session) {
  const grid     = document.getElementById('imageGrid');
  const dropZone = document.getElementById('dropZone');
  if (!grid) return;
  const imgs = session.imageObjs || [];
  if (dropZone) dropZone.classList.toggle('has-images', imgs.length > 0);
  grid.innerHTML = imgs.map((img, i) => `
    <div class="image-thumb" onclick="openLightbox('${img.data}')">
      <img src="${img.data}" alt="screenshot ${i+1}" loading="lazy">
      <button class="del-btn" onclick="deleteImage(event,'${session.id}','${img.id}',${i})">×</button>
    </div>`).join('') +
    (imgs.length ? `<div class="add-more-thumb" onclick="triggerFileInput()">+</div>` : '');
}

async function deleteImage(e, sessionId, imageId, index) {
  e.stopPropagation();
  if (!confirm('Remove this image?')) return;
  const session = allSessions.find(s => s.id === sessionId);
  if (!session) return;
  await deleteImageFromFirestore(sessionId, imageId);
  session.imageObjs.splice(index, 1);
  refreshImageGrid(session);
  renderSessionList(filterSessions(document.getElementById('searchInput').value));
}

// ── Lightbox ─────────────────────────────────────────────────────────────────

function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Notepad creation ─────────────────────────────────────────────────────────

async function createNotepad() {
  const title = prompt('Notepad title:', 'My Notes');
  if (!title) return;
  const now  = Date.now();
  const date = new Date(now).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const res  = await fetch(`${FIRESTORE_BASE}/sessions?key=${FIREBASE_API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: {
      title:     { stringValue: title },
      date:      { stringValue: date },
      timestamp: { integerValue: String(now) },
      wordCount: { integerValue: '0' },
      transcript: { stringValue: '' },
      summary:   { stringValue: '' },
      notes:     { stringValue: '' },
      images:    { arrayValue: { values: [] } },
      isNotepad: { booleanValue: true },
    }})
  });
  const doc = await res.json();
  const newSession = { id: doc.name.split('/').pop(), title, date, timestamp: now, wordCount: 0, transcript: '', summary: '', notes: '', images: [], isNotepad: true };
  allSessions.unshift(newSession);
  renderSessionList(allSessions);
  selectSession(newSession.id);
}

// ── Misc ─────────────────────────────────────────────────────────────────────

function copyActive() {
  const box = document.querySelector('.content-box');
  if (!box) return;
  navigator.clipboard.writeText(box.innerText || box.textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  });
}

function filterSessions(query) {
  if (!query) return allSessions;
  const q = query.toLowerCase();
  return allSessions.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.transcript.toLowerCase().includes(q) ||
    s.summary.toLowerCase().includes(q) ||
    s.notes.toLowerCase().includes(q)
  );
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderSessionList(filterSessions(e.target.value));
});

(async () => {
  try {
    allSessions = await loadSessions();
    renderSessionList(allSessions);
    const totalWords = allSessions.reduce((sum, s) => sum + s.wordCount, 0);
    document.getElementById('headerStats').innerHTML =
      `<strong>${allSessions.length}</strong> lessons &nbsp;·&nbsp; <strong>${totalWords.toLocaleString()}</strong> words`;
  } catch (err) {
    document.getElementById('sessionList').innerHTML =
      `<div style="color:#e74c3c;font-size:13px;">Error: ${err.message}</div>`;
  }
})();
</script>
