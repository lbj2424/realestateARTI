<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTI Study Notes</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --border: #2a2a40;
      --gold: #c9a227;
      --text: #e8e8e8;
      --muted: #777;
      --green: #2ecc71;
      --red: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
    .logo span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 6px; }
    .stats { font-size: 13px; color: var(--muted); }
    .stats strong { color: var(--gold); }
    .search-bar { padding: 24px 32px 0; max-width: 900px; margin: 0 auto; }
    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--gold); }
    .search-bar input::placeholder { color: var(--muted); }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 32px 48px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
    }
    .sessions-panel { position: sticky; top: 84px; max-height: calc(100vh - 100px); overflow-y: auto; }
    .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .session-card:hover { border-color: var(--gold); }
    .session-card.active { border-color: var(--gold); background: #1f1f35; }
    .session-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .session-card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
    .session-card-meta .words { color: var(--gold); }
    .session-card.has-notes .session-card-title::after {
      content: ' ✏️';
      font-size: 10px;
    }
    .session-card.is-notepad { border-left: 3px solid #6c63ff; }
    .new-notepad-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed #3a3a55;
      border-radius: 10px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
      transition: all 0.15s;
    }
    .new-notepad-btn:hover { border-color: #6c63ff; color: #9d97ff; }
    .detail-panel { min-height: 400px; }
    .empty-state { color: var(--muted); text-align: center; padding: 80px 20px; font-size: 15px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 24px; display: flex; gap: 16px; }
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .tab:not(.active):hover { border-color: var(--gold); color: var(--text); }
    .content-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 560px;
      overflow-y: auto;
    }
    .content-box.summary { white-space: normal; }

    /* Manual notes textarea */
    .notes-area {
      width: 100%;
      min-height: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .notes-area:focus { border-color: var(--gold); }
    .notes-area::placeholder { color: #444; }
    .notes-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .save-status {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      transition: color 0.3s;
    }
    .save-status.saved { color: var(--green); }
    .save-status.saving { color: var(--gold); }
    .copy-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    .loading { color: var(--muted); padding: 40px 0; text-align: center; font-size: 14px; }
    .loading::after { content: ''; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; padding: 16px; }
      .sessions-panel { position: static; max-height: none; }
      header { padding: 0 16px; }
      .search-bar { padding: 16px 16px 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ARTI <span>Study Notes</span></div>
  <div class="stats" id="headerStats">Loading...</div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search lessons...">
</div>

<main>
  <div class="sessions-panel">
    <button class="new-notepad-btn" onclick="createNotepad()">+ New Notepad</button>
    <div class="panel-title">All Sessions</div>
    <div id="sessionList"><div class="loading">Loading</div></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="icon">📚</div>
      Select a lesson to view notes
    </div>
  </div>
</main>

<script>
const FIREBASE_PROJECT = 'arti-2195b';
const FIREBASE_API_KEY = 'AIzaSyCPLkBhz_xznp9BP46K89pTR-uw2W5NilA';
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents`;

let allSessions = [];
let activeId = null;
let notesDebounce = null;

function fv(field) {
  if (!field) return '';
  return field.stringValue ?? field.integerValue ?? '';
}

async function loadSessions() {
  const url = `${FIRESTORE_BASE}/sessions?key=${FIREBASE_API_KEY}&pageSize=200`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.documents) return [];
  return data.documents.map(doc => {
    const f = doc.fields || {};
    const nameParts = doc.name.split('/');
    return {
      id: nameParts[nameParts.length - 1],
      title:     fv(f.title) || 'Untitled',
      date:      fv(f.date) || '',
      timestamp: parseInt(fv(f.timestamp) || '0'),
      wordCount: parseInt(fv(f.wordCount) || '0'),
      transcript: fv(f.transcript) || '',
      summary:   fv(f.summary) || '',
      notes:     fv(f.notes) || '',
      isNotepad: f.isNotepad?.booleanValue || false,
    };
  }).sort((a, b) => b.timestamp - a.timestamp);
}

async function createNotepad() {
  const title = prompt('Notepad title:', 'My Notes');
  if (!title) return;

  const now = Date.now();
  const date = new Date(now).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const url = `${FIRESTORE_BASE}/sessions?key=${FIREBASE_API_KEY}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      fields: {
        title:     { stringValue: title },
        date:      { stringValue: date },
        timestamp: { integerValue: String(now) },
        wordCount: { integerValue: '0' },
        transcript: { stringValue: '' },
        summary:   { stringValue: '' },
        notes:     { stringValue: '' },
        isNotepad: { booleanValue: true },
      }
    })
  });

  const doc = await res.json();
  const nameParts = doc.name.split('/');
  const newSession = {
    id: nameParts[nameParts.length - 1],
    title, date, timestamp: now,
    wordCount: 0, transcript: '', summary: '', notes: '',
    isNotepad: true,
  };

  allSessions.unshift(newSession);
  renderSessionList(allSessions);
  selectSession(newSession.id);
}

async function saveNotes(sessionId, notes) {
  const url = `${FIRESTORE_BASE}/sessions/${sessionId}?updateMask.fieldPaths=notes&key=${FIREBASE_API_KEY}`;
  await fetch(url, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: { notes: { stringValue: notes } } })
  });
  // Update local cache
  const session = allSessions.find(s => s.id === sessionId);
  if (session) {
    session.notes = notes;
    renderSessionList(filterSessions(document.getElementById('searchInput').value));
  }
}

function renderSummaryHtml(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3 style="color:#c9a227;margin:16px 0 6px;font-size:14px;">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="color:#c9a227;margin:20px 0 8px;font-size:16px;border-bottom:1px solid #2a2a40;padding-bottom:6px;">$1</h2>')
    .replace(/^# (.+)$/gm, '<h1 style="color:#c9a227;margin:20px 0 10px;font-size:18px;">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li style="margin:4px 0 4px 16px;">$1</li>')
    .replace(/\n\n/g, '<br><br>');
}

function renderSessionList(sessions) {
  const list = document.getElementById('sessionList');
  if (sessions.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:13px;padding:12px 0;">No sessions yet. Record your first lesson!</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-card ${s.id === activeId ? 'active' : ''} ${s.notes ? 'has-notes' : ''} ${s.isNotepad ? 'is-notepad' : ''}" onclick="selectSession('${s.id}')">
      <div class="session-card-title">${s.isNotepad ? '📓 ' : ''}${s.title}</div>
      <div class="session-card-meta">
        <span>${s.date}</span>
        ${s.isNotepad ? '<span style="color:#9d97ff">notepad</span>' : `<span class="words">${s.wordCount.toLocaleString()} words</span>`}
      </div>
    </div>
  `).join('');
}

function selectSession(id) {
  activeId = id;
  const session = allSessions.find(s => s.id === id);
  if (!session) return;

  renderSessionList(filterSessions(document.getElementById('searchInput').value));

  const panel = document.getElementById('detailPanel');
  panel.dataset.transcript = session.transcript;
  panel.dataset.summary = session.summary;
  panel.dataset.sessionId = session.id;

  panel.innerHTML = `
    <div class="detail-title">${session.title}</div>
    <div class="detail-meta">
      <span>${session.date}</span>
      <span>${session.wordCount.toLocaleString()} words</span>
    </div>
    <div class="tabs">
      ${session.isNotepad ? '' : '<button class="tab" onclick="showTab(\'summary\', this)">📋 Study Notes</button>'}
      <button class="tab ${session.isNotepad ? 'active' : ''}" onclick="showTab('notes', this)">✏️ My Notes</button>
      ${session.isNotepad ? '' : '<button class="tab" onclick="showTab(\'transcript\', this)">📝 Transcript</button>'}
    </div>
    <div id="tabContent">
      ${session.isNotepad
        ? ''
        : `<div class="content-box summary">${renderSummaryHtml(session.summary)}</div>`}
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyActive()" ${session.isNotepad ? 'style="display:none"' : ''}>Copy to clipboard</button>
  `;

  // Store notes for tab switching
  panel.dataset.notes = session.notes || '';

  // Notepads open directly to the notes editor
  if (session.isNotepad) {
    showTab('notes', panel.querySelector('.tab.active'));
  }
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('tabContent');
  const copyBtn = document.getElementById('copyBtn');

  if (tab === 'summary') {
    content.innerHTML = `<div class="content-box summary">${renderSummaryHtml(panel.dataset.summary)}</div>`;
    copyBtn.style.display = 'inline-block';
  } else if (tab === 'transcript') {
    content.innerHTML = `<div class="content-box">${panel.dataset.transcript}</div>`;
    copyBtn.style.display = 'inline-block';
  } else if (tab === 'notes') {
    copyBtn.style.display = 'none';
    content.innerHTML = `
      <textarea
        class="notes-area"
        id="notesTextarea"
        placeholder="Type your own notes here — questions, things to remember, connections to other lessons...&#10;&#10;Auto-saves as you type."
      >${panel.dataset.notes}</textarea>
      <div class="notes-footer">
        <span class="save-status" id="saveStatus"></span>
      </div>
    `;

    document.getElementById('notesTextarea').addEventListener('input', (e) => {
      const status = document.getElementById('saveStatus');
      status.textContent = 'Saving...';
      status.className = 'save-status saving';
      panel.dataset.notes = e.target.value;

      clearTimeout(notesDebounce);
      notesDebounce = setTimeout(async () => {
        await saveNotes(panel.dataset.sessionId, e.target.value);
        status.textContent = '✓ Saved';
        status.className = 'save-status saved';
        setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 2000);
      }, 800);
    });
  }
}

function copyActive() {
  const box = document.querySelector('.content-box');
  if (!box) return;
  navigator.clipboard.writeText(box.innerText || box.textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  });
}

function filterSessions(query) {
  if (!query) return allSessions;
  const q = query.toLowerCase();
  return allSessions.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.transcript.toLowerCase().includes(q) ||
    s.summary.toLowerCase().includes(q) ||
    s.notes.toLowerCase().includes(q)
  );
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  renderSessionList(filterSessions(e.target.value));
});

(async () => {
  try {
    allSessions = await loadSessions();
    renderSessionList(allSessions);
    const totalWords = allSessions.reduce((sum, s) => sum + s.wordCount, 0);
    document.getElementById('headerStats').innerHTML =
      `<strong>${allSessions.length}</strong> lessons &nbsp;·&nbsp; <strong>${totalWords.toLocaleString()}</strong> words`;
  } catch (err) {
    document.getElementById('sessionList').innerHTML =
      `<div style="color:#e74c3c;font-size:13px;">Error loading sessions: ${err.message}</div>`;
  }
})();
</script>
</body>
</html>
